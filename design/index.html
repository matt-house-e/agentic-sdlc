<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agentic SDLC — Design Review</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root { --theme-color: #5b6ee1; }
    .markdown-section { max-width: 860px; }
    .markdown-section table { display: table; width: 100%; }
    .markdown-section blockquote { border-left: 4px solid var(--theme-color); background: #f6f7ff; padding: 0.6em 1em; }
    .sidebar-nav li { margin: 4px 0; }
    .app-name-link { font-weight: 700; }
    body { -webkit-font-smoothing: antialiased; }
  </style>
</head>
<body>
  <div id="app">Loading the design review…</div>
  <script>
    window.$docsify = {
      name: 'Agentic SDLC<br><small style="font-weight:400;opacity:.7">Design Review</small>',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      homepage: 'README.md',
      search: { placeholder: 'Search the docs…', noData: 'No matches.', depth: 3 },
      themeColor: '#5b6ee1'
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
</body>
</html>
